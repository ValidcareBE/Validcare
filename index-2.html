function calcScores(scores) {
  const num = (deel) => NORMEN.filter(n => n.deel === deel)
    .map(n => scores[n.nr]).filter(s => s && s !== "NVT").map(Number).filter(n => !isNaN(n));
  const avg = arr => arr.length ? arr.reduce((a, b) => a + b, 0) / arr.length : null;
  const a = num("A"), b = num("B"), c = num("C"), all = [...num("A"), ...num("B"), ...num("C")];
  return { gemA: avg(a), gemB: avg(b), gemC: avg(c), totaal: avg(all), ingevuld: all.length };
}

function getLabelInfo(totaal, heeftKNC) {
  if (heeftKNC || totaal === null) return { label: "Geen Label", kleur: "#ef4444", emoji: "🚫", bg: "#fef2f2", border: "#fecaca" };
  if (totaal >= 3.5) return { label: "ValidCare Gold",   kleur: "#d97706", emoji: "🥇", bg: "#fffbeb", border: "#fde68a" };
  if (totaal >= 3.0) return { label: "ValidCare Silver", kleur: "#64748b", emoji: "🥈", bg: "#f8fafc", border: "#e2e8f0" };
  if (totaal >= 2.5) return { label: "ValidCare Bronze", kleur: "#92400e", emoji: "🥉", bg: "#fef3c7", border: "#fde68a" };
  return { label: "Geen Label", kleur: "#ef4444", emoji: "🚫", bg: "#fef2f2", border: "#fecaca" };
}

function SaveBadge({ status }) {
  if (!status) return null;
  const map = { saving: ["⏳", "#f59e0b", "Opslaan…"], saved: ["✅", "#10b981", "Opgeslagen"], error: ["❌", "#ef4444", "Fout"] };
  const [icon, color, text] = map[status] || [];
  return <span style={{ fontSize: "11px", color, fontWeight: "600", marginLeft: "8px" }}>{icon} {text}</span>;
}

        await window.storage.set("audit-" + huidig.id, JSON.stringify(toSave));
        const sc = calcScores(huidig.scores);
        const summary = { id: huidig.id, auditId: huidig.auditId, praktijkNaam: huidig.praktijkNaam, datum: huidig.datum, auditor: huidig.auditor, status: huidig.status, aangemaaktOp: huidig.aangemaaktOp, opgeslagenOp: toSave.opgeslagenOp, totaal: sc.totaal };
        setAudits(prev => {
          const next = prev.some(a => a.id === huidig.id) ? prev.map(a => a.id === huidig.id ? summary : a) : [...prev, summary];
          window.storage.set("validcare-index", JSON.stringify(next));
          return next;
        });
        setSaveStatus("saved");
        setTimeout(() => setSaveStatus(null), 2500);
      } catch (_) { setSaveStatus("error"); }
    }, 1500);
    return () => clearTimeout(t);
  }, [huidig]);

  const openAudit = async (id) => {
    setLoading(true);
    try {
      const res = await window.storage.get("audit-" + id);

    setLoading(false);

    try {
      await window.storage.delete("audit-" + id);
      const next = audits.filter(a => a.id !== id);
      setAudits(next);
      await window.storage.set("validcare-index", JSON.stringify(next));
      if (huidig?.id === id) { setHuidig(null); setTab("overzicht"); }

    setDeleteConfirm(null);

                  </div>

                { label: "Deel B — Dossier", val: fmt(sc.gemB), sub: "Normen 11–18", kleur: "#8b5cf6" },

                      <div style={{ width: 22, height: 22, borderRadius: "50%", background: T, color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "10px", fontWeight: "700", flexShrink: 0 }}>{norm.nr}</div>
                      <div style={{ flex: 1, fontSize: "12px" }}>{norm.titel} {norm.kritiek && <span style={{ color: "#ef4444", fontSize: "10px" }}>⚠</span>}</div>
                      <span style={{ background: s ? kleur + "20" : "#f1f5f9", color: s ? kleur : "#94a3b8", padding: "2px 10px", borderRadius: "20px", fontSize: "11px", fontWeight: "700", border: `1px solid ${s ? kleur + "40" : "#e2e8f0"}` }}>{s || "—"}</span>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        )}

        {/* ── AGENDA ── */}
        {tab === "agenda" && huidig && <AgendaTab huidig={huidig} patch={patch} T={T} NAVY={NAVY} card={card} />}

        {/* ── VERBETERPLAN ── */}
        {tab === "verbeterplan" && huidig && (
          <div>
            <h2 style={{ margin: "0 0 18px", fontSize: "22px", fontWeight: "800" }}>🔧 Verbeterplan</h2>
            <div style={{ ...card, marginBottom: "14px", background: "#fff7ed", borderColor: "#f59e0b" }}>
              <div style={{ fontSize: "12px", color: "#92400e" }}>Normen met score 1 of 2 verschijnen hier automatisch. Alle wijzigingen worden automatisch opgeslagen.</div>
            </div>
            {NORMEN.filter(n => huidig.scores[n.nr] === "1" || huidig.scores[n.nr] === "2").length === 0 ? (
              <div style={{ ...card, textAlign: "center", padding: "60px", color: "#94a3b8" }}>
                <div style={{ fontSize: "36px", marginBottom: "10px" }}>✅</div>
                <div>Geen normen met score 1 of 2 — of auditformulier nog niet ingevuld.</div>
              </div>
            ) : NORMEN.filter(n => huidig.scores[n.nr] === "1" || huidig.scores[n.nr] === "2").map(norm => (
              <div key={norm.nr} style={{ ...card, marginBottom: "10px", borderLeft: `4px solid ${huidig.scores[norm.nr] === "1" ? "#ef4444" : "#f59e0b"}` }}>
                <div style={{ display: "flex", alignItems: "center", gap: "10px", marginBottom: "12px" }}>
                  <div style={{ width: 26, height: 26, borderRadius: "50%", background: huidig.scores[norm.nr] === "1" ? "#ef4444" : "#f59e0b", color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "11px", fontWeight: "700" }}>{norm.nr}</div>
                  <div style={{ fontWeight: "700", fontSize: "14px", flex: 1 }}>{norm.titel}</div>
                  <span style={{ padding: "2px 10px", borderRadius: "20px", fontSize: "11px", fontWeight: "700", background: huidig.scores[norm.nr] === "1" ? "#fee2e2" : "#fef3c7", color: huidig.scores[norm.nr] === "1" ? "#ef4444" : "#d97706" }}>Score {huidig.scores[norm.nr]}</span>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px" }}>
                  {[{ label: "Probleemomschrijving", field: "probleem" }, { label: "Corrigerende maatregel", field: "maatregel" }, { label: "Verantwoordelijke", field: "verantwoordelijke" }, { label: "Deadline", field: "deadline", type: "date" }].map(f => (
                    <div key={f.field}>
                      <div style={{ fontSize: "10px", color: "#64748b", marginBottom: "3px", fontWeight: "600", textTransform: "uppercase" }}>{f.label}</div>
                      <input type={f.type || "text"} value={(huidig.verbeterplan[norm.nr] || {})[f.field] || ""}
                        onChange={e => patch({ verbeterplan: { ...huidig.verbeterplan, [norm.nr]: { ...(huidig.verbeterplan[norm.nr] || {}), [f.field]: e.target.value } } })}
                        style={{ width: "100%", padding: "7px 10px", border: "1px solid #e2e8f0", borderRadius: "6px", fontSize: "12px", boxSizing: "border-box", fontFamily: "inherit" }} />
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
        )}

        {/* ── NORMEN ── */}
        {tab === "normen" && huidig && (
          <div>
            <h2 style={{ margin: "0 0 18px", fontSize: "22px", fontWeight: "800" }}>📖 Normenregister VC-001:2026</h2>
            {["A", "B", "C"].map(deel => (
              <div key={deel} style={{ marginBottom: "18px" }}>
                <div style={{ fontWeight: "800", fontSize: "12px", padding: "8px 14px", borderRadius: "7px", marginBottom: "8px",
                  background: deel === "A" ? "#eff6ff" : deel === "B" ? "#f5f3ff" : "#fffbeb",
                  color: deel === "A" ? "#1d4ed8" : deel === "B" ? "#7c3aed" : "#d97706" }}>
                  DEEL {deel} — {deel === "A" ? "Klinische Kwaliteit" : deel === "B" ? "Dossier & Administratie" : "Organisatie & KM"}
                </div>
                {NORMEN.filter(n => n.deel === deel).map(norm => (
                  <div key={norm.nr} style={{ ...card, padding: "12px 14px", marginBottom: "6px" }}>
                    <div style={{ display: "flex", gap: "8px", alignItems: "flex-start" }}>
                      <div style={{ width: 24, height: 24, borderRadius: "50%", background: T, color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "10px", fontWeight: "700", flexShrink: 0, marginTop: "1px" }}>{norm.nr}</div>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontWeight: "700", fontSize: "13px", marginBottom: "6px" }}>
                          {norm.titel} {norm.kritiek && <span style={{ marginLeft: "6px", padding: "1px 7px", borderRadius: "20px", background: "#fee2e2", color: "#ef4444", fontSize: "10px", fontWeight: "700" }}>⚠ KRITIEK</span>}
                        </div>
                        <div style={{ display: "flex", flexWrap: "wrap", gap: "3px" }}>
                          {norm.punten.map((p, i) => <span key={i} style={{ padding: "2px 7px", background: "#f0fdf4", color: TD, borderRadius: "4px", fontSize: "11px", border: "1px solid #bbf7d0" }}>{p}</span>)}
                        </div>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            ))}
          </div>
        )}

        {!huidig && tab !== "overzicht" && (
          <div style={{ ...card, textAlign: "center", padding: "60px" }}>
            <div style={{ fontSize: "36px", marginBottom: "10px" }}>📋</div>
            <div style={{ fontWeight: "700" }}>Geen audit geselecteerd</div>
            <button onClick={() => setTab("overzicht")} style={{ marginTop: "16px", padding: "8px 20px", background: T, color: "#fff", border: "none", borderRadius: "7px", cursor: "pointer", fontFamily: "inherit", fontWeight: "600" }}>← Naar overzicht</button>
          </div>
        )}
      </div>

      <div style={{ textAlign: "center", padding: "14px", color: "#94a3b8", fontSize: "10px", borderTop: "1px solid #e2e8f0", marginTop: "20px" }}>
        ValidCare · VC-001:2026 · Kwaliteitsvalidatie Thuisverpleging België · © 2026 · info@validcare.be
      </div>
    </div>
  );
}

function AgendaTab({ huidig, patch, T, NAVY, card }) {
  const [nieuw, setNieuw] = useState({ datum: "", tijd: "09:00", praktijk: "", type: "Audit" });
  const items = huidig.agendaItems || [];
  const add = () => {
    if (!nieuw.datum || !nieuw.praktijk) return;
    patch({ agendaItems: [...items, { ...nieuw, id: Date.now(), status: "Gepland" }] });
    setNieuw({ datum: "", tijd: "09:00", praktijk: "", type: "Audit" });
  };
  return (
    <div>
      <h2 style={{ margin: "0 0 18px", fontSize: "22px", fontWeight: "800" }}>📅 Agenda & Planning</h2>
      <div style={{ ...card, marginBottom: "16px", borderTop: `3px solid ${T}` }}>
        <div style={{ fontWeight: "700", marginBottom: "10px", color: T, fontSize: "13px" }}>+ Nieuwe afspraak</div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(155px, 1fr))", gap: "10px", alignItems: "end" }}>
          {[{ label: "Datum", field: "datum", type: "date" }, { label: "Tijd", field: "tijd", type: "time" }, { label: "Praktijk", field: "praktijk" }].map(f => (
            <div key={f.field}>
              <div style={{ fontSize: "10px", color: "#64748b", marginBottom: "3px", fontWeight: "600", textTransform: "uppercase" }}>{f.label}</div>
              <input type={f.type || "text"} value={nieuw[f.field]} onChange={e => setNieuw(p => ({ ...p, [f.field]: e.target.value }))}
                style={{ width: "100%", padding: "7px 10px", border: "1px solid #e2e8f0", borderRadius: "6px", fontSize: "12px", boxSizing: "border-box", fontFamily: "inherit" }} />
            </div>
          ))}
          <div>
            <div style={{ fontSize: "10px", color: "#64748b", marginBottom: "3px", fontWeight: "600", textTransform: "uppercase" }}>Type</div>
            <select value={nieuw.type} onChange={e => setNieuw(p => ({ ...p, type: e.target.value }))}
              style={{ width: "100%", padding: "7px 10px", border: "1px solid #e2e8f0", borderRadius: "6px", fontSize: "12px", fontFamily: "inherit" }}>
              <option>Audit</option><option>Heraudit</option><option>Pre-analyse</option><option>Nabespreking</option>
            </select>
          </div>
          <button onClick={add} style={{ padding: "8px 16px", background: T, color: "#fff", border: "none", borderRadius: "6px", fontSize: "12px", fontWeight: "700", cursor: "pointer", fontFamily: "inherit" }}>+ Toevoegen</button>
        </div>
      </div>
      <div style={{ ...card }}>
        <div style={{ fontWeight: "700", marginBottom: "10px", color: T, fontSize: "13px" }}>Geplande afspraken</div>
        {items.length === 0 ? (
          <div style={{ color: "#94a3b8", textAlign: "center", padding: "30px", fontSize: "13px" }}>Nog geen afspraken gepland.</div>
        ) : [...items].sort((a, b) => a.datum.localeCompare(b.datum)).map(item => (
          <div key={item.id} style={{ display: "flex", alignItems: "center", gap: "12px", padding: "10px 12px", background: "#f8fafc", borderRadius: "7px", border: "1px solid #e2e8f0", marginBottom: "6px" }}>
            <div style={{ textAlign: "center", minWidth: 42 }}>
              <div style={{ fontSize: "9px", color: T, fontWeight: "700" }}>{item.datum ? new Date(item.datum).toLocaleDateString("nl-BE", { month: "short" }).toUpperCase() : ""}</div>
              <div style={{ fontSize: "20px", fontWeight: "900", color: NAVY, lineHeight: 1 }}>{item.datum ? new Date(item.datum).getDate() : "—"}</div>
            </div>
            <div style={{ width: 1, height: 34, background: "#e2e8f0" }} />
            <div style={{ flex: 1 }}>
              <div style={{ fontWeight: "700", fontSize: "13px" }}>{item.praktijk}</div>
              <div style={{ fontSize: "11px", color: "#64748b" }}>{item.tijd} · {item.type}</div>
            </div>
            <span style={{ padding: "2px 9px", borderRadius: "20px", fontSize: "10px", fontWeight: "700", background: item.status === "Bevestigd" ? "#d1fae5" : "#eff6ff", color: item.status === "Bevestigd" ? "#065f46" : "#1d4ed8" }}>{item.status}</span>
            <button onClick={() => patch({ agendaItems: items.map(a => a.id === item.id ? { ...a, status: a.status === "Gepland" ? "Bevestigd" : "Gepland" } : a) })}
              style={{ padding: "4px 9px", background: "#fff", border: "1px solid #e2e8f0", borderRadius: "5px", fontSize: "10px", cursor: "pointer", fontFamily: "inherit" }}>Toggle</button>
            <button onClick={() => patch({ agendaItems: items.filter(a => a.id !== item.id) })}
              style={{ padding: "4px 8px", background: "#fff", border: "1px solid #fecaca", borderRadius: "5px", fontSize: "11px", cursor: "pointer", color: "#ef4444", fontFamily: "inherit" }}>✕</button>
          </div>
        ))}
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(ValidCareApp));
  </script>
</body>
</html>
